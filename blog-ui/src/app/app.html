<mat-toolbar class="app-toolbar">
  <a class="brand" routerLink="/">✦ BlogApp</a>
  <span class="spacer"></span>
  <button mat-button class="nav-btn" routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}">
    <span class="nav-label">Home</span>
  </button>
  <button mat-button class="nav-btn" routerLink="/posts" routerLinkActive="active-link">
    <span class="nav-label">Posts</span>
  </button>
  <button mat-raised-button class="new-post-btn" routerLink="/posts/new">+ Write</button>
</mat-toolbar>

<router-outlet />
