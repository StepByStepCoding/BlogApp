<div class="post-list-container">
  <div class="list-header">
    <h2>All Posts</h2>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search by title or author</mat-label>
      <input matInput [(ngModel)]="searchTerm" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="posts-grid">
    <mat-card *ngFor="let post of filteredPosts" class="post-card">
      <mat-card-header>
        <mat-card-title>{{ post.title }}</mat-card-title>
        <mat-card-subtitle>{{ post.author }} · {{ post.createdAt | date:'mediumDate' }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-actions>
        <button mat-button [routerLink]="['/posts', post.id]">Read More</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <p *ngIf="filteredPosts.length === 0" class="no-results">No posts match your search.</p>
</div>
