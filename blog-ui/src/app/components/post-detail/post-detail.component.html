<div class="post-detail-container" *ngIf="post">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ post.title }}</mat-card-title>
      <mat-card-subtitle>{{ post.author }} · {{ post.createdAt | date:'medium' }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ post.content }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button [routerLink]="['/posts', post.id, 'edit']">Edit</button>
      <button mat-button color="warn" (click)="delete()">Delete</button>
      <button mat-button routerLink="/posts">Back</button>
    </mat-card-actions>
  </mat-card>
</div>
