@if (post(); as p) {
  <div class="detail-page">
    <div class="detail-header">
      <button mat-button class="back-btn" routerLink="/posts">← Back to Posts</button>
    </div>

    <article class="article-container">
      <header class="article-header">
        <div class="article-meta">
          <span class="author-chip">
            <span class="avatar">{{ p.author[0].toUpperCase() }}</span>
            {{ p.author }}
          </span>
          <span class="dot">·</span>
          <time>{{ p.createdAt | date:'MMMM d, y' }}</time>
          <span class="dot">·</span>
          <span>{{ readTime(p.content) }} min read</span>
        </div>
        <h1 class="article-title">{{ p.title }}</h1>
      </header>

      <div class="article-divider"></div>

      <div class="article-body">
        {{ p.content }}
      </div>

      <footer class="article-footer">
        <div class="footer-left">
          <span class="updated">Last updated {{ p.updatedAt | date:'mediumDate' }}</span>
        </div>
        <div class="footer-actions">
          <button mat-stroked-button class="edit-btn" [routerLink]="['/posts', p.id, 'edit']">
            ✏️ Edit
          </button>
          <button mat-stroked-button class="delete-btn" (click)="delete()">
            🗑 Delete
          </button>
        </div>
      </footer>
    </article>
  </div>
}
